name: Skill CI

on:
  push:
    branches: [beta, main, master]
  pull_request:
    branches: [beta, main, master]

jobs:
  python-tests:
    name: Lambda Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Syntax check (skip placeholders {{...}})
        run: |
          # config.py contient des placeholders Jinja-like — on ne le parse pas
          python -c "import ast; ast.parse(open('lambda/lambda_function.py').read()); print('lambda OK')"

  json-validate:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          for f in skill.json interactionModels/custom/*.json lambda/*.json; do
            python -m json.tool "$f" > /dev/null && echo "✓ $f" || { echo "✗ $f"; exit 1; }
          done

  manifest-check:
    name: Skill manifest sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python -c "
          import json
          m = json.load(open('skill.json'))
          assert 'manifest' in m
          assert m['manifest'].get('apis', {}).get('custom'), 'apis.custom required'
          interfaces = m['manifest']['apis']['custom'].get('interfaces', [])
          apl = [i for i in interfaces if i.get('type') == 'ALEXA_PRESENTATION_APL']
          assert apl, 'APL interface required'
          assert apl[0].get('supportedViewports'), 'viewports required'
          print('manifest OK')
          "
